<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FFMS | Login</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'auth_app/css/login.css' %}">
</head>
<body>

<!-- 🔥 Background Overlay -->
<div class="overlay">

    <!-- 🔥 Top Branding -->
    <div class="top-brand">
        <img src="{% static 'auth_app/images/banasthali_logo.png' %}" class="logo">
        <span>Banasthali Vidyapith</span>
    </div>

    <!-- 🔥 Login Card -->
    <div class="login-card">

        <h2>Log in</h2>
        <p class="form-subtitle">Select your role to continue</p>

        {% if error %}
            <p class="error-text">{{ error }}</p>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <!-- ROLE (UNCHANGED) -->
            <div class="form-group">
                <label>Login as</label>
                <select name="role" id="role" required>
                    <option value="" disabled selected>Select role</option>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>

            <!-- EMAIL -->
            <div class="form-group" id="email-group">
                <label>Email</label>
                <input type="email" name="email" id="email"
                       placeholder="yourname@banasthali.in">
            </div>

            <!-- USERNAME (Admin) -->
            <div class="form-group" id="username-group" style="display:none;">
                <label>Username</label>
                <input type="text" name="username" id="username"
                       placeholder="admin username">
            </div>

            <!-- PASSWORD -->
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="primary-btn">Log in</button>

            <div class="form-footer">
                <a href="{% url 'password_reset' %}">Forgot password?</a>
            </div>

            <div class="form-footer">
                <p>New user? <a href="{% url 'signup' %}">Sign up</a></p>
            </div>
        </form>
    </div>
</div>

<!-- 🔥 SAME JS (UNCHANGED) -->
<script>
    const roleSelect = document.getElementById("role");
    const emailGroup = document.getElementById("email-group");
    const emailInput = document.getElementById("email");
    const usernameGroup = document.getElementById("username-group");
    const usernameInput = document.getElementById("username");

    function toggleLoginFields() {
        if (roleSelect.value === "admin") {
            emailGroup.style.display = "none";
            emailInput.required = false;
            emailInput.value = "";

            usernameGroup.style.display = "block";
            usernameInput.required = true;
        } else {
            emailGroup.style.display = "block";
            emailInput.required = true;

            usernameGroup.style.display = "none";
            usernameInput.required = false;
            usernameInput.value = "";
        }
    }

    toggleLoginFields();
    roleSelect.addEventListener("change", toggleLoginFields);
</script>

</body>
</html>
