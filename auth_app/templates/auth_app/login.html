<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FFMS | Login</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'auth_app/css/login.css' %}">
</head>
<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <!-- Logo -->
        <div class="logo-section">
            <img src="{% static 'auth_app/images/banasthali_logo.png' %}"
                 alt="Banasthali Vidyapith"
                 class="college-logo">
        </div>

        <!-- Left Illustration -->
        <div class="auth-left">
            <img src="{% static 'auth_app/images/login_illustration.jpg' %}"
                 alt="Login Illustration"
                 class="illustration">
        </div>

        <!-- Right Form -->
        <div class="auth-right">

            <h2 class="form-title">Log in</h2>
            <p class="form-subtitle">Use your institutional credentials</p>

            <form id="loginForm" novalidate>

                <!-- Role -->
                <div class="form-group">
                    <label>Role</label>
                    <select id="role">
                        <option value="">Select role</option>
                        <option value="STUDENT">Student</option>
                        <option value="FACULTY">Faculty</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                    <span class="error-text" id="roleError"></span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="example@banasthali.in">
                    <span class="error-text" id="emailError"></span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password">
                    <span class="error-text" id="passwordError"></span>
                </div>

                <button type="submit" class="primary-btn">
                    Log in
                </button>

                <div class="form-footer">
                    <a href="#">Forgot password?</a>
                    <p>Don’t have an account? <a href="#">Sign up</a></p>
                </div>

            </form>

        </div>
    </div>
</div>

<script src="{% static 'auth_app/js/login.js' %}"></script>

</body>
</html>
