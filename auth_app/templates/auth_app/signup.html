<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FFMS | Sign Up</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'auth_app/css/login.css' %}">
    <!-- 👆 reuse SAME CSS as login -->
</head>
<body>

<!-- 🔥 SAME BACKGROUND OVERLAY -->
<div class="overlay">

    <!-- 🔥 SAME TOP BRAND -->
    <div class="top-brand">
        <img src="{% static 'auth_app/images/banasthali_logo.png' %}" class="logo">
        <span>Banasthali Vidyapith</span>
    </div>

    <!-- 🔥 SAME CARD STYLE -->
    <div class="login-card">

        <h2>Create Account</h2>
        <p class="form-subtitle">Use your institutional email</p>

        {% if error %}
            <p class="error-text">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- EMAIL -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email"
                       placeholder="yourname@banasthali.in" required>
            </div>

            <!-- ROLE -->
            <div class="form-group">
                <label>Register as</label>
                <select name="role" required>
                    <option value="" disabled selected>Select role</option>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                </select>
            </div>

            <!-- PASSWORD -->
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required>
            </div>

            <button type="submit" class="primary-btn">Sign Up</button>

            <div class="form-footer">
                <p>Already have an account?
                    <a href="{% url 'login' %}">Log in</a>
                </p>
            </div>

        </form>
    </div>
</div>

</body>
</html>
