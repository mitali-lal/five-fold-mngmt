<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FFMS | Sign Up</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'auth_app/css/signup.css' %}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Logo -->
        <div class="logo-section">
            <img src="{% static 'auth_app/images/banasthali_logo.png' %}"
                 alt="Banasthali Vidyapith"
                 class="college-logo">
        </div>

        <!-- Left Illustration -->
        <div class="auth-left">
            <img src="{% static 'auth_app/images/signup_illustration.jpg' %}"
                 alt="Signup Illustration"
                 class="illustration">
        </div>

        <!-- Right Form -->
        <div class="auth-right">
            <h2 class="form-title">Create Account</h2>
            <p class="form-subtitle">Use your institutional email</p>

            {% if error %}
                <p class="error-text">{{ error }}</p>
            {% endif %}

            <form method="POST">
    {% csrf_token %}

    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
    </div>

    <div class="form-group">
        <label>Role</label>
        <select name="role" required>
            <option value="">Select Role</option>
            <option value="student">Student</option>
            <option value="faculty">Faculty</option>
        </select>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
    </div>

    <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required>
    </div>

    <button type="submit">Sign Up</button>
</form>

        </div>

    </div>
</div>

</body>
</html>
