<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FFMS | Sign Up</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'auth_app/css/signup.css' %}">
</head>
<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <!-- Logo -->
        <div class="logo-section">
            <img src="{% static 'auth_app/images/banasthali_logo.png' %}"
                 alt="Banasthali Vidyapith"
                 class="college-logo">
        </div>

        <!-- Left Illustration -->
        <div class="auth-left">
            <img src="{% static 'auth_app/images/login_illustration.jpg' %}"
                 alt="Signup Illustration"
                 class="illustration">
        </div>

        <!-- Right Form -->
        <div class="auth-right">

            <h2 class="form-title">Create Account</h2>
            <p class="form-subtitle">Use your institutional email</p>

            <form id="signupForm" novalidate>

                <!-- Role -->
                <div class="form-group">
                    <label>Role</label>
                    <select id="role">
                        <option value="">Select role</option>
                        <option value="STUDENT">Student</option>
                        <option value="FACULTY">Faculty</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                    <span class="error-text" id="roleError"></span>
                </div>

                <!-- Full Name -->
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter full name">
                    <span class="error-text" id="nameError"></span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="example@banasthali.in">
                    <span class="error-text" id="emailError"></span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create password">
                    <span class="error-text" id="passwordError"></span>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password">
                    <span class="error-text" id="confirmPasswordError"></span>
                </div>

                <button type="submit" class="primary-btn">
                    Sign Up
                </button>

                <div class="form-footer">
                    <p>Already have an account? <a href="/login/">Login</a></p>
                </div>

            </form>

        </div>
    </div>
</div>

<script src="{% static 'auth_app/js/signup.js' %}"></script>

</body>
</html>
