<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify your email | FFMS</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'auth_app/css/login.css' %}">
</head>
<body>

<!-- 🔥 Background Overlay -->
<div class="overlay">

    <!-- 🔥 Top Branding -->
    <div class="top-brand">
        <img src="{% static 'auth_app/images/banasthali_logo.png' %}" class="logo">
        <span>Banasthali Vidyapith</span>
    </div>

    <!-- 🔥 Glass Card -->
    <div class="login-card" style="text-align:center;">

        <h2>Check your email 📧</h2>

        <p style="margin-top:15px;">
            We’ve sent a verification link to your email address.
        </p>

        <p>
            Please verify your email before logging in.
        </p>

        <p style="margin-top:20px; color:#bbb;">
            Didn’t receive it? Check your spam folder.
        </p>

        <!-- ✅ FIXED BUTTON -->
        <div style="margin-top:25px;">
            <a href="{% url 'login' %}" class="primary-btn"
               style="display:inline-block; width:auto; padding:12px 30px;">
                Go to Login
            </a>
        </div>

    </div>

</div>

</body>
</html>
